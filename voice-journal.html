<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Journal</title>
<style>
  :root {
    --bg: #1b1b1d;
    --panel: #242427;
    --panel-light: #2d2d31;
    --border: #3a3a3e;
    --text: #ece9e2;
    --text-dim: #9c9a94;
    --accent: #d8843b;
    --accent-dim: #8a5a2c;
    --danger: #d4534f;
    --radius: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 {
    font-size: 16px;
    margin: 0 0 12px;
    font-weight: 600;
  }
  #new-entry-btn {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #1b1b1d;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #new-entry-btn:hover { background: #e69648; }
  #entry-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .entry-item {
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    margin-bottom: 4px;
    position: relative;
  }
  .entry-item:hover { background: var(--panel-light); }
  .entry-item.active { background: var(--accent-dim); }
  .entry-item .title {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-item .meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .entry-item .delete-btn {
    position: absolute;
    right: 8px;
    top: 10px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 4px;
    display: none;
  }
  .entry-item:hover .delete-btn { display: block; }
  .entry-item .delete-btn:hover { color: var(--danger); background: rgba(212,83,79,0.15); }

  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #toolbar {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  #title-input {
    font-size: 18px;
    font-weight: 600;
    background: none;
    border: none;
    color: var(--text);
    flex: 1;
    min-width: 160px;
    padding: 4px 6px;
    border-radius: 6px;
  }
  #title-input:focus { background: var(--panel-light); outline: none; }

  .btn {
    padding: 9px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--panel-light);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn.record {
    background: var(--accent);
    color: #1b1b1d;
    border-color: var(--accent);
  }
  .btn.record:hover { background: #e69648; }
  .btn.recording {
    background: var(--danger);
    color: white;
    border-color: var(--danger);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #status-bar {
    padding: 8px 24px;
    font-size: 12px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    min-height: 16px;
  }
  #status-bar.error { color: var(--danger); }
  #status-bar.live { color: var(--accent); }

  #content-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    justify-content: center;
  }
  #editor-wrap {
    width: 100%;
    max-width: 700px;
  }
  #audio-player-wrap {
    margin-bottom: 16px;
  }
  #audio-player-wrap audio {
    width: 100%;
  }
  #transcript-editor {
    width: 100%;
    min-height: 400px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 16px;
    line-height: 1.7;
    padding: 24px;
    resize: vertical;
    font-family: Georgia, "Times New Roman", serif;
  }
  #transcript-editor:focus { outline: 1px solid var(--accent); }
  #transcript-editor::placeholder { color: var(--text-dim); }

  #empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-dim);
    max-width: 360px;
  }
  #empty-state h2 { color: var(--text); font-size: 18px; }
  #empty-state p { font-size: 14px; line-height: 1.6; }

  .word-count {
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 8px;
  }

  @media print {
    #sidebar, #toolbar, #status-bar, #audio-player-wrap, .word-count { display: none !important; }
    body { background: white; color: black; height: auto; overflow: visible; }
    #main, #content-area { overflow: visible; height: auto; }
    #transcript-editor {
      border: none;
      background: white;
      color: black;
      font-size: 13pt;
      padding: 0;
      width: 100%;
    }
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Voice journal</h1>
    <button id="new-entry-btn">+ New entry</button>
  </div>
  <div id="entry-list"></div>
</div>

<div id="main">
  <div id="toolbar" style="display:none;">
    <input id="title-input" type="text" placeholder="Chapter 1" />
    <button class="btn record" id="record-btn"><i>●</i> Record</button>
    <button class="btn" id="print-btn">Export / Print</button>
  </div>
  <div id="status-bar"></div>
  <div id="content-area">
    <div id="empty-state">
      <h2>No entry selected</h2>
      <p>Click "New entry" to start a chapter or journal entry. Record yourself talking, and it will transcribe automatically as you speak. Edit the text afterward, then export or print it as a clean page.</p>
    </div>
    <div id="editor-wrap" style="display:none;">
      <div id="audio-player-wrap" style="display:none;"></div>
      <textarea id="transcript-editor" placeholder="Your transcript will appear here as you speak. You can also just type or edit directly."></textarea>
      <div class="word-count" id="word-count"></div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'voice_journal_entries_v1';
let entries = [];
let activeId = null;
let recognizer = null;
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let finalTranscriptAtStart = '';

function loadEntries() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [];
  } catch (e) {
    entries = [];
  }
}

function saveEntries() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  } catch (e) {
    setStatus('Could not save — storage may be full or blocked.', true);
  }
}

function setStatus(msg, isError, isLive) {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg || '';
  bar.className = isError ? 'error' : (isLive ? 'live' : '');
}

function uid() {
  return 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
}

function renderList() {
  const list = document.getElementById('entry-list');
  list.innerHTML = '';
  const sorted = [...entries].sort((a, b) => b.updatedAt - a.updatedAt);
  sorted.forEach(entry => {
    const item = document.createElement('div');
    item.className = 'entry-item' + (entry.id === activeId ? ' active' : '');
    const date = new Date(entry.updatedAt);
    item.innerHTML = `
      <div class="title">${escapeHtml(entry.title || 'Untitled')}</div>
      <div class="meta">${date.toLocaleDateString()} · ${(entry.transcript || '').split(/\s+/).filter(Boolean).length} words</div>
      <button class="delete-btn" title="Delete">✕</button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) return;
      selectEntry(entry.id);
    });
    item.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm('Delete "' + (entry.title || 'Untitled') + '"? This cannot be undone.')) {
        deleteEntry(entry.id);
      }
    });
    list.appendChild(item);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function createEntry() {
  const entry = {
    id: uid(),
    title: 'Chapter ' + (entries.length + 1),
    transcript: '',
    audioDataUrl: null,
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  entries.push(entry);
  saveEntries();
  renderList();
  selectEntry(entry.id);
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  saveEntries();
  if (activeId === id) {
    activeId = null;
    showEmptyState();
  }
  renderList();
}

function selectEntry(id) {
  if (isRecording) stopRecording();
  activeId = id;
  const entry = entries.find(e => e.id === id);
  if (!entry) return;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('editor-wrap').style.display = 'block';
  document.getElementById('toolbar').style.display = 'flex';

  document.getElementById('title-input').value = entry.title;
  document.getElementById('transcript-editor').value = entry.transcript || '';
  updateWordCount();

  const playerWrap = document.getElementById('audio-player-wrap');
  if (entry.audioDataUrl) {
    playerWrap.style.display = 'block';
    playerWrap.innerHTML = `<audio controls src="${entry.audioDataUrl}"></audio>`;
  } else {
    playerWrap.style.display = 'none';
    playerWrap.innerHTML = '';
  }

  setStatus('');
  renderList();
}

function showEmptyState() {
  document.getElementById('empty-state').style.display = 'block';
  document.getElementById('editor-wrap').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
}

function updateWordCount() {
  const text = document.getElementById('transcript-editor').value;
  const words = text.split(/\s+/).filter(Boolean).length;
  document.getElementById('word-count').textContent = words + ' words';
}

function persistCurrentEditor() {
  if (!activeId) return;
  const entry = entries.find(e => e.id === activeId);
  if (!entry) return;
  entry.title = document.getElementById('title-input').value || 'Untitled';
  entry.transcript = document.getElementById('transcript-editor').value;
  entry.updatedAt = Date.now();
  saveEntries();
  renderList();
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function startRecording() {
  if (!activeId) return;

  if (!SpeechRecognition) {
    setStatus('Speech recognition is not supported in this browser. Try Chrome or Edge. You can still type manually.', true);
  }

  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onloadend = () => {
        const entry = entries.find(e => e.id === activeId);
        if (entry) {
          entry.audioDataUrl = reader.result;
          saveEntries();
          const playerWrap = document.getElementById('audio-player-wrap');
          playerWrap.style.display = 'block';
          playerWrap.innerHTML = `<audio controls src="${reader.result}"></audio>`;
        }
      };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();

    if (SpeechRecognition) {
      recognizer = new SpeechRecognition();
      recognizer.continuous = true;
      recognizer.interimResults = true;
      recognizer.lang = 'en-US';

      const textarea = document.getElementById('transcript-editor');
      finalTranscriptAtStart = textarea.value;
      if (finalTranscriptAtStart && !finalTranscriptAtStart.endsWith(' ') && !finalTranscriptAtStart.endsWith('\n')) {
        finalTranscriptAtStart += ' ';
      }
      let finalTranscript = finalTranscriptAtStart;

      recognizer.onresult = (event) => {
        let interim = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcriptPiece = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcriptPiece + ' ';
          } else {
            interim += transcriptPiece;
          }
        }
        textarea.value = finalTranscript + interim;
        updateWordCount();
        textarea.scrollTop = textarea.scrollHeight;
      };

      recognizer.onerror = (event) => {
        if (event.error === 'not-allowed') {
          setStatus('Microphone access was blocked. Check your browser/site permissions and reload the page.', true);
        } else if (event.error === 'no-speech') {
          // benign, keep going
        } else {
          setStatus('Speech recognition error: ' + event.error, true);
        }
      };

      recognizer.onend = () => {
        if (isRecording) {
          try { recognizer.start(); } catch (e) {}
        }
      };

      try {
        recognizer.start();
        setStatus('Recording and transcribing live…', false, true);
      } catch (e) {
        setStatus('Could not start speech recognition: ' + e.message, true);
      }
    } else {
      setStatus('Recording audio only (no live transcript in this browser).', false, true);
    }

    isRecording = true;
    updateRecordButton();
  }).catch(err => {
    setStatus('Microphone access denied or unavailable: ' + err.message, true);
  });
}

function stopRecording() {
  isRecording = false;
  if (recognizer) {
    try { recognizer.stop(); } catch (e) {}
    recognizer = null;
  }
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  updateRecordButton();
  setStatus('Recording stopped. Transcript saved — feel free to edit it.');
  persistCurrentEditor();
}

function updateRecordButton() {
  const btn = document.getElementById('record-btn');
  if (isRecording) {
    btn.textContent = '■ Stop';
    btn.classList.add('recording');
    btn.classList.remove('record');
  } else {
    btn.innerHTML = '<i>●</i> Record';
    btn.classList.remove('recording');
    btn.classList.add('record');
  }
}

function exportPrint() {
  persistCurrentEditor();
  window.print();
}

document.getElementById('new-entry-btn').addEventListener('click', createEntry);
document.getElementById('record-btn').addEventListener('click', () => {
  if (isRecording) stopRecording();
  else startRecording();
});
document.getElementById('print-btn').addEventListener('click', exportPrint);
document.getElementById('title-input').addEventListener('input', persistCurrentEditor);
document.getElementById('transcript-editor').addEventListener('input', () => {
  updateWordCount();
  persistCurrentEditor();
});

window.addEventListener('beforeunload', () => {
  if (isRecording) stopRecording();
});

loadEntries();
renderList();
showEmptyState();
</script>

</body>
</html>
